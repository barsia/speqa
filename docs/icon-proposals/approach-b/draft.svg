<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Approach B: Perforation dots + rect (like current) but with status badge overlay -->
  <g transform="translate(8,8) rotate(-10) translate(-8,-8)">
    <!-- Stamp body -->
    <rect x="3.5" y="2.5" width="9" height="11" rx="0.3" fill="none" stroke="#C4A000" stroke-width="0.45"/>
    <!-- Perforation dots - top -->
    <circle cx="3.5" cy="2.5" r="0.5" fill="#C4A000"/>
    <circle cx="5.75" cy="2.5" r="0.5" fill="#C4A000"/>
    <circle cx="8" cy="2.5" r="0.5" fill="#C4A000"/>
    <circle cx="10.25" cy="2.5" r="0.5" fill="#C4A000"/>
    <circle cx="12.5" cy="2.5" r="0.5" fill="#C4A000"/>
    <!-- Perforation dots - bottom -->
    <circle cx="3.5" cy="13.5" r="0.5" fill="#C4A000"/>
    <circle cx="5.75" cy="13.5" r="0.5" fill="#C4A000"/>
    <circle cx="8" cy="13.5" r="0.5" fill="#C4A000"/>
    <circle cx="10.25" cy="13.5" r="0.5" fill="#C4A000"/>
    <circle cx="12.5" cy="13.5" r="0.5" fill="#C4A000"/>
    <!-- Perforation dots - left -->
    <circle cx="3.5" cy="5.25" r="0.5" fill="#C4A000"/>
    <circle cx="3.5" cy="8" r="0.5" fill="#C4A000"/>
    <circle cx="3.5" cy="10.75" r="0.5" fill="#C4A000"/>
    <!-- Perforation dots - right -->
    <circle cx="12.5" cy="5.25" r="0.5" fill="#C4A000"/>
    <circle cx="12.5" cy="8" r="0.5" fill="#C4A000"/>
    <circle cx="12.5" cy="10.75" r="0.5" fill="#C4A000"/>
    <!-- Horizontal lines suggesting text/content -->
    <line x1="5" y1="5.5" x2="11" y2="5.5" stroke="#C4A000" stroke-width="0.3" opacity="0.5"/>
    <line x1="5" y1="7" x2="11" y2="7" stroke="#C4A000" stroke-width="0.3" opacity="0.5"/>
    <line x1="5" y1="8.5" x2="11" y2="8.5" stroke="#C4A000" stroke-width="0.3" opacity="0.5"/>
  </g>
  <!-- Status badge: pencil dot (draft) - positioned outside rotation -->
  <circle cx="12.5" cy="12.5" r="2" fill="#C4A000" opacity="0.9"/>
  <path d="M11.5,13.2 L12.8,11.9 L13.2,12.3 L11.9,13.6 Z M13,11.7 L13.3,11.4 L13.6,11.7 L13.3,12 Z" fill="white" stroke="none"/>
</svg>
