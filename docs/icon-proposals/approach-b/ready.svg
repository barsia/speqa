<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Approach B: Perforation dots + rect with status badge overlay (ready) -->
  <g transform="translate(8,8) rotate(-10) translate(-8,-8)">
    <!-- Stamp body -->
    <rect x="3.5" y="2.5" width="9" height="11" rx="0.3" fill="none" stroke="#3E9B4F" stroke-width="0.45"/>
    <!-- Perforation dots - top -->
    <circle cx="3.5" cy="2.5" r="0.5" fill="#3E9B4F"/>
    <circle cx="5.75" cy="2.5" r="0.5" fill="#3E9B4F"/>
    <circle cx="8" cy="2.5" r="0.5" fill="#3E9B4F"/>
    <circle cx="10.25" cy="2.5" r="0.5" fill="#3E9B4F"/>
    <circle cx="12.5" cy="2.5" r="0.5" fill="#3E9B4F"/>
    <!-- Perforation dots - bottom -->
    <circle cx="3.5" cy="13.5" r="0.5" fill="#3E9B4F"/>
    <circle cx="5.75" cy="13.5" r="0.5" fill="#3E9B4F"/>
    <circle cx="8" cy="13.5" r="0.5" fill="#3E9B4F"/>
    <circle cx="10.25" cy="13.5" r="0.5" fill="#3E9B4F"/>
    <circle cx="12.5" cy="13.5" r="0.5" fill="#3E9B4F"/>
    <!-- Perforation dots - left -->
    <circle cx="3.5" cy="5.25" r="0.5" fill="#3E9B4F"/>
    <circle cx="3.5" cy="8" r="0.5" fill="#3E9B4F"/>
    <circle cx="3.5" cy="10.75" r="0.5" fill="#3E9B4F"/>
    <!-- Perforation dots - right -->
    <circle cx="12.5" cy="5.25" r="0.5" fill="#3E9B4F"/>
    <circle cx="12.5" cy="8" r="0.5" fill="#3E9B4F"/>
    <circle cx="12.5" cy="10.75" r="0.5" fill="#3E9B4F"/>
    <!-- Horizontal lines suggesting text/content -->
    <line x1="5" y1="5.5" x2="11" y2="5.5" stroke="#3E9B4F" stroke-width="0.3" opacity="0.5"/>
    <line x1="5" y1="7" x2="11" y2="7" stroke="#3E9B4F" stroke-width="0.3" opacity="0.5"/>
    <line x1="5" y1="8.5" x2="11" y2="8.5" stroke="#3E9B4F" stroke-width="0.3" opacity="0.5"/>
  </g>
  <!-- Status badge: checkmark (ready) -->
  <circle cx="12.5" cy="12.5" r="2" fill="#3E9B4F" opacity="0.9"/>
  <polyline points="11.3,12.5 12.1,13.3 13.7,11.7" fill="none" stroke="white" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
