<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B4185"/>
      <stop offset="100%" stop-color="#24285F"/>
    </linearGradient>

    <radialGradient id="bgHighlight" cx="78%" cy="6%" r="48%">
      <stop offset="0%" stop-color="#7F89DD" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="#616BC3" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#616BC3" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="innerGlow" cx="56%" cy="28%" r="62%">
      <stop offset="0%" stop-color="#5A63B2" stop-opacity="0.48"/>
      <stop offset="55%" stop-color="#40489A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#40489A" stop-opacity="0"/>
    </radialGradient>

    <filter id="appShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#16193D" flood-opacity="0.22"/>
    </filter>

    <filter id="symbolShadow" x="-20%" y="-20%" width="150%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#14183B" flood-opacity="0.24"/>
    </filter>

    <filter id="innerShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="8" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feColorMatrix in="inverse" type="matrix"
        values="0 0 0 0 0.06
                0 0 0 0 0.08
                0 0 0 0 0.20
                0 0 0 0.28 0" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>

    <linearGradient id="whiteFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCFCFD"/>
      <stop offset="100%" stop-color="#F0F1F5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <g filter="url(#appShadow)">
    <rect x="64" y="60" width="384" height="384" rx="78" fill="url(#bgBase)"/>
    <rect x="64" y="60" width="384" height="384" rx="78" fill="url(#bgHighlight)"/>
    <rect x="64" y="60" width="384" height="384" rx="78" fill="url(#innerGlow)"/>
    <rect x="64" y="60" width="384" height="384" rx="78" fill="none" stroke="#6067BE" stroke-opacity="0.15" stroke-width="1.5"/>
  </g>

  <!-- Symbol -->
  <g filter="url(#symbolShadow)">
    <!-- Q ring as filled annulus, gap edges parallel to tail -->
    <path
      d="M 332 369
         A 145 145 0 1 1 376 327
         L 348 308
         A 111 111 0 1 0 318 337
         Z"
      fill="url(#whiteFill)"/>

    <!-- Tail — trapezoid, edges continuous with ring gap -->
    <path
      d="M 330 328
         L 340 322
         L 412 388
         L 372 398
         Z"
      fill="url(#whiteFill)"/>

    <!-- Check centered in ring at (256,245) -->
    <path
      d="M 208 245
         L 250 288
         L 322 205"
      fill="none"
      stroke="url(#whiteFill)"
      stroke-width="32"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>

  <!-- Very subtle inner shadow for depth -->
  <rect x="64" y="60" width="384" height="384" rx="78" fill="transparent" filter="url(#innerShadow)"/>
</svg>
