<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B4185"/>
      <stop offset="100%" stop-color="#24285F"/>
    </linearGradient>

    <radialGradient id="bgHighlight" cx="78%" cy="6%" r="48%">
      <stop offset="0%" stop-color="#7F89DD" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="#616BC3" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#616BC3" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="whiteFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCFCFD"/>
      <stop offset="100%" stop-color="#F0F1F5"/>
    </linearGradient>
  </defs>

  <!-- Background with minimal padding -->
  <rect x="16" y="16" width="480" height="480" rx="64" fill="url(#bgBase)"/>
  <rect x="16" y="16" width="480" height="480" rx="64" fill="url(#bgHighlight)"/>

  <!-- Thin white border -->
  <rect x="16" y="16" width="480" height="480" rx="64" fill="none" stroke="#FFFFFF" stroke-width="12"/>

  <!-- Q symbol scaled up and centered -->
  <g transform="translate(256,252) scale(1.35) translate(-256,-252)">
    <!-- Q ring -->
    <path
      d="M 332 369
         A 145 145 0 1 1 376 327
         L 348 308
         A 111 111 0 1 0 318 337
         Z"
      fill="url(#whiteFill)"/>

    <!-- Tail -->
    <path
      d="M 330 328
         L 340 322
         L 412 388
         L 372 398
         Z"
      fill="url(#whiteFill)"/>

    <!-- Check -->
    <path
      d="M 208 245
         L 250 288
         L 322 205"
      fill="none"
      stroke="url(#whiteFill)"
      stroke-width="32"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>
</svg>
